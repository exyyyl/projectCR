name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            args: --win --x64
            artifact: windows-x64
          - name: macOS Universal
            os: macos-15
            args: --mac --universal
            artifact: macos-universal
          - name: Linux x64
            os: ubuntu-latest
            args: --linux --x64
            artifact: linux-x64

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.12.0
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Package
        run: npm run package -- ${{ matrix.args }}

      - name: Name Windows portable package
        if: matrix.artifact == 'windows-x64'
        shell: pwsh
        run: Get-ChildItem dist -Filter '*-Setup-*.zip' | Rename-Item -NewName { $_.Name -replace '-Setup-', '-Portable-' }

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/*.dmg
            dist/*.dmg.blockmap
            dist/*.zip
            dist/*.zip.blockmap
            dist/*.AppImage
            dist/*.deb
            dist/latest*.yml

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ProjectCR ${{ github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: release-artifacts/**/*
